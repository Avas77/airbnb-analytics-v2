name: airbnb_analytics_v2

profile: airbnb_analytics_v2

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  # Builds seeds into '<your_schema_name>_raw'
  airbnb_analytics_v2:
    +schema: raw

models:
  airbnb_analytics_v2:
    # Materialize staging models as views, and marts as tables
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table

      intermediate:
        +materialized: table  # (or view/table depending on your preference)
        +schema: intermediate
