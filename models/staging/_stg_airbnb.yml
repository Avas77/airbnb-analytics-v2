models:
  - name: stg_listings
    description: one listings per row
    columns:
      - name: listing_id
        description: primary key
        data_tests:
          - unique
          - not_null
      - name: review_scores_rating
        description: Review score rating (0–5)
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 5
  - name: stg_reviews
    description: one review per row
    columns:
      - name: review_id
        tests: 
          - unique
          - not_null
      - name: listing_id
        tests:
          - not_null 
  - name: stg_calendar
    description: one row per date
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments: 
            combination_of_columns:
              - listing_id
              - calendar_date
  - name: stg_hosts
    description: one row per host
    columns:
      - name: host_id
        tests: 
          - unique
          - not_null
